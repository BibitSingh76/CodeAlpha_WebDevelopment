<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">
    <title>Age Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="age-container">
        <!-- Heading -->
        <div class="age-header">
            Age Calculator
        </div>

        <!-- Input Section -->
        <div class="age-input">
            <label for="dob">
                Select Your Birth Date
            </label>
            <input type="date" id="dob" class="age-dob-input">
        </div>

        <div class="age-btn">
            <button class="calculate-btn">
                Calculate Age
            </button>
            
        </div>

        <div class="age-result">Your age will appear here</div>
        <button class="reset-btn">
                Reset
        </button>
    </div>

    <script src="script.js"></script>

</body>
</html>
