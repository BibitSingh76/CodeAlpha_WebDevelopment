<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">
    <title>My Projects</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        body{
            font-family:Arial,sans-serif;
            background:linear-gradient(135deg,#141e30,#243b55);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }
        .container{
            text-align:center;
            background:white;
            padding:40px;
            border-radius:15px;
            width:400px;
            box-shadow:0 0 20px rgba(0,0,0,0.3);
        }
        h1{
            margin-bottom:30px;
            color:#243b55;
        }
        .project-link{
            display:block;
            text-decoration:none;
            background:#243b55;
            color:white;
            padding:15px;
            margin:15px 0;
            border-radius:10px;
            font-size:1.1rem;
            transition:0.3s;
        }
        .project-link:hover{
            background:#141e30;
            transform:scale(1.03);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>My Projects</h1>
        <a class="project-link"
        href="Task-1-Age-Calculator/">
            Age Calculator
        </a>
    </div>

</body>
</html>
